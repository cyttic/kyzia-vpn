name: Deploy WireGuard VPN

# Connects to the Azure VM over SSH and runs the setup/add-client scripts.
# Requires three repo secrets:
#   AZURE_USER     - SSH username on the VM (e.g. azureuser)
#   AZURE_ADDRESS  - VM address / public IP (e.g. 20.197.16.237)
#   AZURE_SSH_KEY  - SSH PRIVATE key that logs into the VM
#
# Note: the VM must allow inbound SSH (TCP 22) from the internet for the GitHub
# runner to reach it, and the WireGuard UDP port must be open in the NSG
# (run azure/open-ports.sh yourself, or open it in the Azure Portal).

on:
  # Deploy automatically on every push to main...
  push:
    branches: [main]
  # ...and allow manual runs with a custom device name / port.
  workflow_dispatch:
    inputs:
      client_name:
        description: "Device name for the new client config"
        required: true
        default: "phone"
      wg_port:
        description: "WireGuard UDP port (try 443 if 51820 is censored)"
        required: true
        default: "51820"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_USER: ${{ secrets.AZURE_USER }}
      SSH_HOST: ${{ secrets.AZURE_ADDRESS }}
      # On push there are no form inputs, so fall back to these defaults.
      CLIENT_NAME: ${{ github.event.inputs.client_name || 'phone' }}
      WG_PORT: ${{ github.event.inputs.wg_port || '51820' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy scripts to the VM
        run: |
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -r \
            server client "$SSH_USER@$SSH_HOST:~/kyzia-vpn/"

      - name: Install / refresh WireGuard server
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd ~/kyzia-vpn && sudo WG_PORT='$WG_PORT' bash server/setup-server.sh"

      - name: Add client and fetch its config
        run: |
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "cd ~/kyzia-vpn && sudo ENDPOINT='$SSH_HOST' WG_PORT='$WG_PORT' bash client/add-client.sh '$CLIENT_NAME'"
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST:~/kyzia-vpn/clients/$CLIENT_NAME.conf" \
            "./$CLIENT_NAME.conf"
          if [[ ! -s "$CLIENT_NAME.conf" ]]; then
            echo "::error::Client config was not produced"; exit 1
          fi

      - name: Upload client config (download it, then delete this run)
        uses: actions/upload-artifact@v4
        with:
          name: wg-${{ env.CLIENT_NAME }}
          path: ${{ env.CLIENT_NAME }}.conf
          retention-days: 1
