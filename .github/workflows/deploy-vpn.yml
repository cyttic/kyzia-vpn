name: Deploy AmneziaWG VPN

# Connects to the Azure VM over SSH and runs the setup/add-client scripts.
# Requires three repo secrets:
#   AZURE_USER     - SSH username on the VM (e.g. azureuser)
#   AZURE_ADDRESS  - VM address / public IP (e.g. 20.197.16.237)
#   AZURE_SSH_KEY  - SSH PRIVATE key that logs into the VM
#
# Note: the VM must allow inbound SSH (TCP 22) from the internet for the GitHub
# runner to reach it, and the AmneziaWG UDP port (443 by default) must be open in
# the NSG — a ONE-TIME step: run azure/open-ports.sh yourself, or open it in the
# Azure Portal. The deploy itself is fully automatic on every push to main.

on:
  # Deploy automatically on every push to main...
  push:
    branches: [main]
  # ...and allow manual runs with a custom device name / port.
  workflow_dispatch:
    inputs:
      client_name:
        description: "Device name for the new client config"
        required: true
        default: "phone"
      wg_port:
        description: "AmneziaWG UDP port (443 blends with QUIC/HTTPS; 51820 is the plain default)"
        required: true
        default: "443"
      force:
        description: "Regenerate the device even if it already exists (new keys)"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_USER: ${{ secrets.AZURE_USER }}
      SSH_HOST: ${{ secrets.AZURE_ADDRESS }}
      # On push there are no form inputs, so fall back to these defaults.
      CLIENT_NAME: ${{ github.event.inputs.client_name || 'phone' }}
      # Default to UDP 443 — obfuscated AmneziaWG on 443 is the combo that beats
      # Russia's TSPU. UDP 443 must be open in the NSG (one-time, see README).
      WG_PORT: ${{ github.event.inputs.wg_port || '443' }}
      # On push: keep existing device configs valid. Manual run can force new keys.
      FORCE: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy scripts to the VM
        run: |
          scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new -r \
            server client "$SSH_USER@$SSH_HOST:~/kyzia-vpn/"

      - name: Install / refresh WireGuard server
        run: |
          # `sudo env VAR=...` reliably passes vars through sudo (the bare
          # `sudo VAR=... cmd` form is dropped by some sudoers configs).
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "set -e; cd \$HOME/kyzia-vpn; \
             sudo env WG_PORT='$WG_PORT' bash server/setup-server.sh"

      - name: Add client and fetch its config
        run: |
          # add-client's chatty output -> stderr (visible in the log); only the
          # config itself (sudo cat, absolute path) goes to stdout -> the file.
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "set -e; cd \$HOME/kyzia-vpn; \
             sudo env ENDPOINT='$SSH_HOST' WG_PORT='$WG_PORT' FORCE='$FORCE' OUT_DIR=\$HOME/kyzia-vpn/clients \
               bash client/add-client.sh '$CLIENT_NAME' 1>&2; \
             sudo cat \$HOME/kyzia-vpn/clients/'$CLIENT_NAME'.conf" > "$CLIENT_NAME.conf"
          if [[ ! -s "$CLIENT_NAME.conf" ]]; then
            echo "::error::Client config was empty or not produced (see step log above)"; exit 1
          fi
          echo "Captured $(wc -l < "$CLIENT_NAME.conf") lines into $CLIENT_NAME.conf"

      - name: Upload client config (download it, then delete this run)
        uses: actions/upload-artifact@v4
        with:
          name: wg-${{ env.CLIENT_NAME }}
          path: ${{ env.CLIENT_NAME }}.conf
          retention-days: 1
